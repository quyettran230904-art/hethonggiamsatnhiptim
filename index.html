<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Health Monitor — Cloud Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;800&display=swap');

    /* ===== THEME VARIABLES ===== */
    :root {
      --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236;
      --cyan:#00e5ff; --red:#ff3d5a; --green:#00e096;
      --text:#e2e8f0; --muted:#4a5568; --border:#1e2d42;
      --input-bg:#1a2236; --input-text:#e2e8f0;
    }
    [data-theme="light"] {
      --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc;
      --cyan:#0891b2; --red:#dc2626; --green:#059669;
      --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --input-bg:#f8fafc; --input-text:#1e293b;   /* ← FIX LIGHT MODE */
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; transition:background .3s,color .3s; }

    /* ===== LAYOUT ===== */
    .wrapper{ max-width:820px; margin:0 auto; }

    header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .logo{ font-size:1rem; font-weight:800; color:var(--cyan); letter-spacing:1.5px; }

    /* ===== VIEWS ===== */
    .view{ display:none; animation:fadeUp .35s ease-out forwards; }
    .view.active{ display:block; }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* ===== METRIC GRID ===== */
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; margin-bottom:18px; }

    /* ===== CARD ===== */
    .card{ background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:28px; transition:background .3s,border-color .3s; }
    .card-label{ font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; display:block; }
    .card-val{ font-family:'DM Mono',monospace; font-size:3.8rem; font-weight:500; line-height:1; }

    /* ===== STATUS BADGE ===== */
    .badge{ display:inline-block; margin-top:10px; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; }
    .badge-ok  { background:rgba(0,224,150,.12); color:var(--green); }
    .badge-bad { background:rgba(255,61,90,.12);  color:var(--red); }
    .badge-wait{ background:rgba(74,85,104,.15);  color:var(--muted); }

    /* ===== HISTORY ===== */
    .history-item{
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 0; border-bottom:1px solid var(--border);
      font-family:'DM Mono',monospace; font-size:0.85rem;
    }
    .history-item:last-child{ border-bottom:none; }
    .history-bpm{ color:var(--red); }
    .history-spo2{ color:var(--cyan); }
    .history-time{ color:var(--muted); font-size:.78rem; }

    /* ===== FORM ===== */
    .field{ margin-bottom:16px; }
    .field label{ display:block; font-size:.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }

    /* FIX: input text & background đều dùng CSS var */
    input{
      width:100%; padding:14px 16px;
      background:var(--input-bg);
      border:1.5px solid var(--border);
      border-radius:10px;
      color:var(--input-text);     /* ← FIX LIGHT MODE text */
      font-size:1rem;
      font-family:'Outfit',sans-serif;
      outline:none;
      transition:border-color .2s, background .3s, color .3s;
      -webkit-appearance:none;
      appearance: none;
    }
    input:focus{ border-color:var(--cyan); }
    input::placeholder{ color:var(--muted); }

    /* ===== BUTTONS ===== */
    .btn{ display:block; width:100%; padding:16px; border-radius:12px; border:none; font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer; text-align:center; transition:.2s; text-decoration:none; font-size:1rem; }
    .btn:active{ transform:scale(0.98); }
    .btn-primary{ background:var(--cyan); color:#000; font-weight:800; font-size:1.05rem; letter-spacing:.5px; }
    .btn-primary:hover{ opacity:.88; box-shadow:0 4px 14px rgba(0,229,255,.25); }
    .btn-outline{ background:transparent; border:1.5px solid var(--border); color:var(--text); margin-top:10px; }
    .btn-outline:hover{ border-color:var(--cyan); color:var(--cyan); }
    .btn-danger{ background:transparent; border:1.5px solid var(--red); color:var(--red); margin-top:10px; }
    .btn-danger:hover{ background:rgba(255,61,90,.08); }
    .btn-sm{ width:auto; padding:8px 14px; font-size:.85rem; }

    /* ===== LOADER ===== */
    .loader{ text-align:center; padding:32px 0; color:var(--muted); font-size:.9rem; }
    .loader::before{ content:''; display:block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    /* ===== EMPTY STATE ===== */
    .empty{ text-align:center; padding:24px 0; color:var(--muted); font-size:.88rem; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">HEALTH MONITOR</div>
    <button class="btn btn-outline btn-sm" onclick="toggleTheme()">🌓 Theme</button>
  </header>

  <main>
    <!-- ===== TRANG CHỦ ===== -->
    <div id="view-main" class="view active">
      <div class="grid">
        <div class="card">
          <span class="card-label">Nhịp Tim (BPM)</span>
          <div id="bpm" class="card-val" style="color:var(--red)">--</div>
          <span id="bpm-badge" class="badge badge-wait">Đang chờ...</span>
        </div>
        <div class="card">
          <span class="card-label">Nồng độ Oxy (SpO2 %)</span>
          <div id="spo2" class="card-val" style="color:var(--cyan)">--</div>
        </div>
      </div>

      <div class="card">
        <span class="card-label">📜 Lịch sử 10 lần đo gần nhất</span>
        <div id="history-list"><div class="loader"></div></div>
      </div>

      <button class="btn btn-outline" style="margin-top:6px" onclick="showPage('config')">⚙ Thiết lập thiết bị từ xa</button>
    </div>

    <!-- ===== TRANG CẤU HÌNH ===== -->
    <div id="view-config" class="view">
      <div class="card">
        <h2 style="font-size:1.1rem; margin-bottom:6px; color:var(--cyan)">Cấu hình Cloud</h2>
        <p style="font-size:.88rem; color:var(--muted); margin-bottom:22px">
          Nhập thông tin mạng mới cho ESP32. Lệnh gửi qua Firebase — mạch sẽ tự khởi động lại.
        </p>

        <div class="field">
          <label>Tên WiFi (SSID)</label>
          <input type="text" id="r-ssid" placeholder="Nhập tên mạng" autocomplete="off">
        </div>
        <div class="field">
          <label>Mật khẩu WiFi</label>
          <input type="password" id="r-pass" placeholder="Nhập mật khẩu">
        </div>
        <div class="field">
          <label>SĐT Nhận Cảnh Báo</label>
          <input type="tel" id="r-phone" placeholder="Ví dụ: 0911174193">
        </div>

        <button class="btn btn-primary" onclick="sendRemoteConfig()">GỬI CẤU HÌNH XUỐNG MẠCH</button>
        <button class="btn btn-danger" onclick="showPage('main')">◀ Quay lại trang chủ</button>
      </div>
    </div>
  </main>
</div>

<script>
// ===== THEME =====
(function(){
  var t = localStorage.getItem('hm-theme') || 'dark';
  if(t === 'light') document.documentElement.setAttribute('data-theme','light');
})();

function toggleTheme(){
  var isLight = document.documentElement.hasAttribute('data-theme');
  if(isLight){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('hm-theme','dark');
  } else {
    document.documentElement.setAttribute('data-theme','light');
    localStorage.setItem('hm-theme','light');
  }
}

// ===== CHUYỂN TRANG =====
function showPage(id){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0,0);
}

// ===== FIREBASE =====
var firebaseConfig = {
  apiKey:      "AIzaSyCEfYu2WL_SZtfJPRpXMnUJ3i-zPTk6BeY",
  databaseURL: "https://heart-monitor-fd061-default-rtdb.firebaseio.com/",
  projectId:   "heart-monitor-fd061"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== FORMAT TIMESTAMP =====
// Nhận epoch ms hoặc millis() từ ESP32 (nhỏ hơn 1 tỷ → là millis, không phải epoch)
function formatTime(t){
  if(!t) return '—';
  // millis() từ ESP32 thường < 86_400_000 (1 ngày) nếu mới boot
  // epoch ms > 1_600_000_000_000 (năm 2020+)
  if(t < 1600000000000){
    // Là millis, chuyển thành "XXm YYs từ lúc boot"
    var s = Math.floor(t / 1000);
    var m = Math.floor(s / 60);
    return m > 0 ? (m + 'ph ' + (s % 60) + 's') : (s + 's sau boot');
  }
  return new Date(t).toLocaleTimeString('vi-VN');
}

// ===== REALTIME LISTENER =====
db.ref('/').on('value', function(snap){
  var d = snap.val();
  if(!d) return;

  // --- Cập nhật số liệu ---
  var bpm  = d.NhipTim || 0;
  var spo2 = d.Oxy     || 0;
  document.getElementById('bpm').innerText  = bpm  > 0 ? bpm  : '--';
  document.getElementById('spo2').innerText = spo2 > 0 ? spo2 : '--';

  // Badge trạng thái BPM
  var badge = document.getElementById('bpm-badge');
  if(bpm > 100)      { badge.className='badge badge-bad'; badge.innerText='⚠ Nhịp tim cao!'; }
  else if(bpm < 60 && bpm > 0) { badge.className='badge badge-bad'; badge.innerText='⚠ Nhịp tim thấp!'; }
  else if(bpm > 0)   { badge.className='badge badge-ok';  badge.innerText='✓ Bình thường'; }
  else               { badge.className='badge badge-wait'; badge.innerText='Đang chờ dữ liệu...'; }

  // --- Lịch sử ---
  var histEl = document.getElementById('history-list');
  if(d.History){
    var items = Object.values(d.History).reverse().slice(0,10);
    histEl.innerHTML = items.map(function(i){
      return '<div class="history-item">'
        + '<span><span class="history-bpm">❤ ' + (i.b||'?') + ' BPM</span>'
        + ' &nbsp; <span class="history-spo2">○ ' + (i.s||'?') + '%</span></span>'
        + '<span class="history-time">' + formatTime(i.t) + '</span>'
        + '</div>';
    }).join('');
  } else {
    histEl.innerHTML = '<div class="empty">Chưa có dữ liệu lịch sử.</div>';
  }
});

// ===== GỬI CẤU HÌNH TỪ XA =====
function sendRemoteConfig(){
  var s  = document.getElementById('r-ssid').value.trim();
  var p  = document.getElementById('r-pass').value;
  var ph = document.getElementById('r-phone').value.trim();

  if(!s || !p || !ph){
    alert('Vui lòng điền đầy đủ thông tin!');
    return;
  }

  if(!confirm('Xác nhận gửi cấu hình?\nMạch sẽ tự khởi động lại sau khi nhận lệnh.')){
    return;
  }

  db.ref('/RemoteConfig').set({
    ssid:s, pass:p, phone:ph, timestamp:Date.now()
  }).then(function(){
    alert('Đã gửi thành công! Thiết bị sẽ khởi động lại trong vài giây.');
    // Xóa form
    document.getElementById('r-ssid').value = '';
    document.getElementById('r-pass').value = '';
    document.getElementById('r-phone').value = '';
    showPage('main');
  }).catch(function(err){
    alert('Lỗi khi gửi: ' + err.message);
  });
}
</script>
</body>
</html>
