<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Health Monitor - Hệ Thống Giám Sát Cloud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lexend:wght@400;600;700&family=Montserrat:wght@700;800&family=Outfit:wght@300;600;800&display=swap');

        :root {
            /* Theme Tối (Mặc định) */
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --cyan: #00e5ff;
            --red: #ff3d5a;
            --orange: #ff9100;
            --green: #00e096;
            --text: #e2e8f0;
            --muted: #4a5568;
            --border: #1e2d42;
        }

        [data-theme="light"] {
            /* Theme Sáng */
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        header {
            max-width: 860px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .btn-theme {
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Outfit';
            font-weight: 600;
        }

        main {
            max-width: 860px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .card-val {
            font-family: 'DM Mono', monospace;
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* Lịch sử đo */
        .history-container {
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono';
            font-size: 0.9rem;
        }

        .history-item:last-child { border-bottom: none; }

        /* Form cấu hình */
        .config-section {
            margin-top: 30px;
        }

        .field { margin-bottom: 15px; }
        
        .field label {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Outfit';
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--cyan);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary:hover { opacity: 0.9; }

        .conn-status {
            font-size: 0.8rem;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="logo">
        <h1>HEALTH MONITOR <span style="font-weight:300; font-size:0.8rem">CLOUD</span></h1>
    </div>
    <button class="btn-theme" onclick="toggleTheme()">🌓 Đổi Giao Diện</button>
</header>

<main>
    <div class="conn-status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Đang kết nối Cloud...</span>
    </div>

    <div class="grid">
        <div class="card">
            <span class="card-label">Nhịp Tim Hiện Tại</span>
            <div class="card-val" id="bpm" style="color:var(--red)">--</div>
            <span style="color:var(--muted)">BPM</span>
        </div>
        <div class="card">
            <span class="card-label">Nồng Độ Oxy (SpO2)</span>
            <div class="card-val" id="spo2" style="color:var(--cyan)">--</div>
            <span style="color:var(--muted)">%</span>
        </div>
    </div>

    <div class="card">
        <span class="card-label">📜 Lịch Sử 10 Lần Đo Gần Nhất</span>
        <div class="history-container" id="history-list">
            <p style="color:var(--muted)">Chưa có dữ liệu lịch sử...</p>
        </div>
    </div>

    <div class="card config-section">
        <span class="card-label">⚙️ Cấu Hình Thiết Bị Từ Xa</span>
        <div class="field">
            <label>Tên WiFi Mới (SSID)</label>
            <input type="text" id="remote-ssid" placeholder="Nhập tên WiFi">
        </div>
        <div class="field">
            <label>Mật Khẩu WiFi</label>
            <input type="password" id="remote-pass" placeholder="Nhập mật khẩu">
        </div>
        <div class="field">
            <label>Số Điện Thoại Cảnh Báo</label>
            <input type="tel" id="remote-phone" placeholder="VD: 0911174193">
        </div>
        <button class="btn-primary" onclick="sendRemoteConfig()">GỬI CẤU HÌNH XUỐNG MẠCH</button>
    </div>
</main>

<footer style="text-align:center; margin-top:40px; color:var(--muted); font-size:0.8rem">
    Đồ án tốt nghiệp · Trần Hữu Quyết · HaUI 2026
</footer>

<script>
    // 1. CHUYỂN ĐỔI THEME SÁNG TỐI
    function toggleTheme() {
        const body = document.body;
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'light');
        }
    }

    // 2. CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCEfYu2WL_SZtfJPRpXMnUJ3i-zPTk6BeY",
        authDomain: "heart-monitor-fd061.firebaseapp.com",
        databaseURL: "https://heart-monitor-fd061-default-rtdb.firebaseio.com/",
        projectId: "heart-monitor-fd061"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 3. LẮNG NGHE DỮ LIỆU REALTIME
    database.ref('/').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Cập nhật trạng thái kết nối
            document.getElementById('status-text').innerText = "Đã đồng bộ Cloud";
            document.getElementById('status-dot').style.background = "var(--green)";

            // Cập nhật số liệu
            document.getElementById('bpm').innerText = data.NhipTim || "--";
            document.getElementById('spo2').innerText = data.Oxy || "--";

            // Cập nhật lịch sử (Node /History)
            if (data.History) {
                const historyData = Object.values(data.History).reverse().slice(0, 10);
                let historyHtml = "";
                historyData.forEach(item => {
                    historyHtml += `
                        <div class="history-item">
                            <span>❤️ ${item.b} BPM | 🫧 ${item.s}%</span>
                            <span style="color:var(--muted)">${new Date(item.t).toLocaleTimeString()}</span>
                        </div>
                    `;
                });
                document.getElementById('history-list').innerHTML = historyHtml;
            }
        }
    }, (error) => {
        document.getElementById('status-text').innerText = "Lỗi kết nối Firebase";
        document.getElementById('status-dot').style.background = "var(--red)";
    });
  // 4. GỬI CẤU HÌNH TỪ XA
    function sendRemoteConfig() {
        const ssid = document.getElementById('remote-ssid').value.trim();
        const pass = document.getElementById('remote-pass').value;
        const phone = document.getElementById('remote-phone').value.trim();

        if (!ssid || !pass || !phone) {
            alert("Vui lòng điền đầy đủ thông tin!");
            return;
        }

        if (confirm("Gửi cấu hình này xuống thiết bị? Mạch sẽ tự động đổi WiFi và khởi động lại.")) {
            // Lưu ý: dùng biến database thay vì db để khớp với code ở trên
            database.ref('/RemoteConfig').set({
                ssid: ssid,
                pass: pass,
                phone: phone,
                timestamp: Date.now()
            }).then(() => {
                alert("Đã gửi thành công! Hãy đợi khoảng 10-20 giây để mạch nhận lệnh.");
                // Tải lại trang để xóa form sau khi gửi
                window.location.reload(); 
            }).catch((err) => {
                alert("Lỗi khi gửi lệnh: " + err);
            });
        }
    }
</script>
</body>
</html>
