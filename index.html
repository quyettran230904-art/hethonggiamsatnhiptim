<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Health Monitor - Cloud Dashboard</title>
    <style>
        /* Tải phông chữ chuyên nghiệp */
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600&family=Montserrat:wght@700;800&family=Outfit:wght@300;600;800&display=swap');

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --cyan: #00e5ff;
            --red: #ff3d5a;
            --green: #00e096;
            --text: #e2e8f0;
            --muted: #4a5568;
            --border: #1e2d42;
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 { font-size: 1.1rem; color: var(--cyan); letter-spacing: 1px; }

        main { max-width: 800px; margin: 0 auto; position: relative; }

        /* --- CẤU TRÚC CHUYỂN TRANG (VIEWS) --- */
        .view {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .view.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Thẻ hiển thị chỉ số */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        .card-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .card-val { font-family: 'DM Mono', monospace; font-size: 4rem; font-weight: 500; }

        /* Lịch sử */
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono';
            font-size: 0.9rem;
        }

        /* Nút bấm */
        .btn {
            cursor: pointer;
            border-radius: 12px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        /* NÚT GỬI CẤU HÌNH (PHÔNG MONTSERRAT) */
        .btn-send {
            width: 100%;
            padding: 18px;
            background: var(--cyan);
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 20px;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,229,255,0.4); }

        .btn-nav {
            padding: 15px;
            width: 100%;
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
            margin-top: 10px;
        }
        .btn-nav:hover { border-color: var(--cyan); color: var(--cyan); }

        /* Input form */
        input {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--cyan); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="logo"><h1>HEALTH MONITOR</h1></div>
    <button class="btn btn-nav" style="width: auto; padding: 8px 16px;" onclick="toggleTheme()">🌓 Theme</button>
</header>

<main>
    <div id="view-main" class="view active">
        <div class="grid">
            <div class="card">
                <span class="card-label">Nhịp Tim (BPM)</span>
                <div class="card-val" id="bpm" style="color:var(--red)">--</div>
            </div>
            <div class="card">
                <span class="card-label">Oxy (SpO2 %)</span>
                <div class="card-val" id="spo2" style="color:var(--cyan)">--</div>
            </div>
        </div>

        <div class="card">
            <span class="card-label">📜 Lịch sử 10 lần đo gần nhất</span>
            <div id="history-list"></div>
        </div>

        <button class="btn btn-nav" onclick="showPage('config')">⚙ THIẾT LẬP THIẾT BỊ TỪ XA</button>
    </div>

    <div id="view-config" class="view">
        <div class="card">
            <h2 style="margin-bottom: 10px; color: var(--cyan)">Cấu hình Cloud</h2>
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 25px;">
                Nhập thông tin mạng mới cho ESP32. Lệnh sẽ được gửi qua Firebase.
            </p>

            <div style="margin-bottom: 15px;">
                <label class="card-label">Tên WiFi (SSID)</label>
                <input type="text" id="r-ssid" placeholder="Nhập tên mạng">
            </div>
            <div style="margin-bottom: 15px;">
                <label class="card-label">Mật khẩu WiFi</label>
                <input type="password" id="r-pass" placeholder="Nhập mật khẩu">
            </div>
            <div style="margin-bottom: 15px;">
                <label class="card-label">SĐT Nhận Cảnh Báo</label>
                <input type="tel" id="r-phone" placeholder="Ví dụ: 0911174193">
            </div>

            <button class="btn btn-send" onclick="sendRemoteConfig()">GỬI CẤU HÌNH XUỐNG MẠCH</button>
            
            <button class="btn btn-nav" style="border-color: var(--red); color: var(--red); margin-top: 20px;" onclick="showPage('main')">
                ◀ QUAY LẠI TRANG CHỦ
            </button>
        </div>
    </div>
</main>

<script>
    // 1. CHUYỂN TRANG KHÔNG LOAD LẠI WEB
    function showPage(pageId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + pageId).classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleTheme() {
        const b = document.body;
        b.hasAttribute('data-theme') ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'light');
    }

    // 2. FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCEfYu2WL_SZtfJPRpXMnUJ3i-zPTk6BeY",
        databaseURL: "https://heart-monitor-fd061-default-rtdb.firebaseio.com/",
        projectId: "heart-monitor-fd061"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('/').on('value', (snap) => {
        const d = snap.val();
        if (d) {
            document.getElementById('bpm').innerText = d.NhipTim || "--";
            document.getElementById('spo2').innerText = d.Oxy || "--";
            if (d.History) {
                const h = Object.values(d.History).reverse().slice(0, 10);
                document.getElementById('history-list').innerHTML = h.map(i => 
                    `<div class="history-item"><span>❤️ ${i.b} BPM | 🫧 ${i.s}%</span> <span>${new Date(i.t).toLocaleTimeString()}</span></div>`
                ).join('');
            }
        }
    });

    // 3. GỬI CẤU HÌNH TỪ XA
    function sendRemoteConfig() {
        const s = document.getElementById('r-ssid').value.trim();
        const p = document.getElementById('r-pass').value;
        const ph = document.getElementById('r-phone').value.trim();

        if (!s || !p || !ph) return alert("Vui lòng điền đủ!");

        if (confirm("Xác nhận gửi cấu hình? Mạch sẽ tự khởi động lại.")) {
            database.ref('/RemoteConfig').set({
                ssid: s, pass: p, phone: ph, timestamp: Date.now()
            }).then(() => {
                alert("Đã gửi! Đang chuyển bạn về trang chủ...");
                showPage('main'); // Tự động quay về trang chính sau khi gửi
            });
        }
    }
</script>
</body>
</html>
