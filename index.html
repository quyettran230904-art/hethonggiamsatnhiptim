<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Health Monitor — Cloud Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap');

    /* ===== THEME VARIABLES ===== */
    :root {
      --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236;
      --cyan:#00e5ff; --red:#ff3d5a; --green:#00e096;
      --text:#e2e8f0; --muted:#94a3b8; --border:#1e2d42;
      --input-bg:#1a2236; --input-text:#e2e8f0;
    }
    [data-theme="light"] {
      --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc;
      --cyan:#0891b2; --red:#dc2626; --green:#059669;
      --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --input-bg:#f8fafc; --input-text:#1e293b;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; transition:background .3s,color .3s; line-height: 1.5; }

    .wrapper{ max-width:700px; margin:0 auto; }
    header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .logo{ font-family:'Space Grotesk',sans-serif; font-size:1.1rem; font-weight:700; color:var(--cyan); letter-spacing:1px; }

    /* ===== VIEWS ===== */
    .view{ display:none; animation:fadeUp .35s ease-out forwards; }
    .view.active{ display:block; }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ===== TRANG PHỤ (CONFIG) ===== */
    #view-config, #view-config * { font-family: "Times New Roman", Times, serif !important; }
    #view-config .card-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 8px; color: var(--text); }
    #view-config .card-desc { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
    #view-config label { font-size: 1rem; font-weight: bold; color: var(--text); margin-bottom: 6px; display: block; }
    #view-config input { font-size: 1rem; padding: 12px; margin-bottom: 4px; }

    /* ===== METRIC GRID ===== */
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; margin-bottom:20px; }
    .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; transition:0.3s; }
    .card-label{ font-size:0.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; display:block; }
    .card-val{ font-family:'JetBrains Mono',monospace; font-size:2.8rem; font-weight:500; line-height:1.1; }

    .badge{ display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:4px 12px; border-radius:8px; font-size:0.8rem; font-weight:600; }
    .badge-ok { background:rgba(0,224,150,.1); color:var(--green); }
    .badge-bad { background:rgba(255,61,90,.1); color:var(--red); }
    .badge-wait{ background:rgba(148,163,184,.1); color:var(--muted); }

    /* ===== HISTORY ===== */
    .history-item{ display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:0.9rem; }
    .history-time{ color:var(--muted); font-size:0.8rem; }

    /* ===== FORM & INPUTS ===== */
    .field{ margin-bottom:20px; }
    input{ width:100%; padding:12px 16px; background:var(--input-bg); border:1.5px solid var(--border); border-radius:10px; color:var(--input-text); outline:none; transition:0.2s; }
    input:focus{ border-color:var(--cyan); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }

    /* ===== BUTTONS ===== */
    .btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; border-radius:12px; border:none; cursor:pointer; transition:.2s; text-decoration:none; font-weight:600; font-size: 1rem; }
    .btn:active{ transform:scale(0.98); }

    .btn-primary{ background:#0891b2; color: #ffffff !important; box-shadow:0 4px 12px rgba(8,145,178,0.2); }
    .btn-primary:hover{ background:#0e7490; }

    .btn-outline{ background:transparent; border:1.5px solid var(--border); color:var(--text); margin-top:12px; }
    .btn-outline:hover{ border-color:var(--cyan); color:var(--cyan); }
    
    .btn-danger{ background:transparent; border:1.5px solid var(--red); color:var(--red); margin-top:12px; }
    .btn-danger:hover{ background: rgba(255,61,90, 0.05); }

    .btn-sm{ width:auto; padding:6px 14px; font-size:0.85rem; margin-top:0; border-radius: 8px; }

    .loader{ text-align:center; padding:20px 0; color:var(--muted); font-size:0.9rem; }
    .loader::before{ content:''; display:block; width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">HEALTH MONITOR</div>
    <button class="btn btn-outline btn-sm" onclick="toggleTheme()">🌓 Giao diện</button>
  </header>

  <main>
    <div id="view-main" class="view active">
      <div class="grid">
        <div class="card">
          <span class="card-label">Nhịp Tim (BPM)</span>
          <div id="bpm" class="card-val" style="color:var(--red)">--</div>
          <span id="bpm-badge" class="badge badge-wait">Đang chờ...</span>
        </div>
        <div class="card">
          <span class="card-label">Oxy (SpO2 %)</span>
          <div id="spo2" class="card-val" style="color:var(--cyan)">--</div>
        </div>
      </div>

      <div class="card">
        <span class="card-label">📜 Lịch sử đo</span>
        <div id="history-list"><div class="loader">Đang tải...</div></div>
      </div>

      <button class="btn btn-outline btn-toggle-view" onclick="showPage('config')">⚙ Thiết lập thiết bị từ xa</button>
    </div>

    <div id="view-config" class="view">
      <div class="card">
        <div class="card-title">Cấu hình Cloud</div>
        <p class="card-desc">Cập nhật thông tin WiFi và SĐT nhận cảnh báo qua hệ thống Cloud.</p>

        <div class="field">
          <label>Tên WiFi (SSID)</label>
          <input type="text" id="r-ssid" placeholder="Nhập tên mạng" autocomplete="off">
        </div>
        <div class="field">
          <label>Mật khẩu WiFi</label>
          <input type="password" id="r-pass" placeholder="Nhập mật khẩu">
        </div>
        <div class="field">
          <label>SĐT Nhận Cảnh Báo</label>
          <input type="tel" id="r-phone" placeholder="09xxxxxxxx">
        </div>

        <button class="btn btn-primary" onclick="sendRemoteConfig()">Lưu và Chấp Nhận</button>
        <button class="btn btn-danger" onclick="showPage('main')">◀ Quay lại trang chủ</button>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  var t = localStorage.getItem('hm-theme') || 'dark';
  if(t === 'light') document.documentElement.setAttribute('data-theme','light');
})();

function toggleTheme(){
  var isLight = document.documentElement.hasAttribute('data-theme');
  if(isLight){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('hm-theme','dark');
  } else {
    document.documentElement.setAttribute('data-theme','light');
    localStorage.setItem('hm-theme','light');
  }
}

function showPage(id){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0,0);
}

var firebaseConfig = {
  apiKey: "AIzaSyCEfYu2WL_SZtfJPRpXMnUJ3i-zPTk6BeY",
  databaseURL: "https://heart-monitor-fd061-default-rtdb.firebaseio.com/",
  projectId: "heart-monitor-fd061"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function formatTime(t){
  if(!t) return '—';
  if(t < 1600000000000) return Math.floor(t/1000) + 's sau boot';
  return new Date(t).toLocaleTimeString('vi-VN');
}

db.ref('/').on('value', function(snap){
  var d = snap.val();
  if(!d) return;
  var bpm = d.NhipTim || 0;
  var spo2 = d.Oxy || 0;
  document.getElementById('bpm').innerText = bpm > 0 ? Math.round(bpm) : '--';
  document.getElementById('spo2').innerText = spo2 > 0 ? Math.round(spo2) : '--';

  var badge = document.getElementById('bpm-badge');
  if(bpm > 100) { badge.className='badge badge-bad'; badge.innerText='⚠ Nhịp tim cao'; }
  else if(bpm < 60 && bpm > 0) { badge.className='badge badge-bad'; badge.innerText='⚠ Nhịp tim thấp'; }
  else if(bpm > 0) { badge.className='badge badge-ok'; badge.innerText='✓ Bình thường'; }
  else { badge.className='badge badge-wait'; badge.innerText='Đang chờ dữ liệu'; }

  var histEl = document.getElementById('history-list');
  if(d.History){
    var items = Object.values(d.History).reverse().slice(0,10);
    histEl.innerHTML = items.map(function(i){
      return '<div class="history-item">'
        + '<span><b style="color:var(--red)">❤ ' + (i.b||'?') + '</b> | <b style="color:var(--cyan)">○ ' + (i.s||'?') + '%</b></span>'
        + '<span class="history-time">' + formatTime(i.t) + '</span>'
        + '</div>';
    }).join('');
  }
});

function sendRemoteConfig(){
  var s = document.getElementById('r-ssid').value.trim();
  var p = document.getElementById('r-pass').value;
  var ph = document.getElementById('r-phone').value.trim();
  if(!s || !p || !ph) return alert('Vui lòng điền đầy đủ thông tin!');
  if(!confirm('Xác nhận gửi cấu hình Cloud?')) return;

  db.ref('/RemoteConfig').set({ ssid:s, pass:p, phone:ph, timestamp:Date.now() })
  .then(function(){
    alert('Đã gửi cấu hình! Thiết bị sẽ nhận lệnh và khởi động lại.');
    showPage('main');
  });
}
</script>
</body>
</html>
